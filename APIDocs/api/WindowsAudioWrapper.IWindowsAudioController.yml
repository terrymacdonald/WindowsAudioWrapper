  type: Method
  source:
    remote:
      path: WindowsAudioWrapper/IWindowsAudioController.cs
      branch: develop
      repo: https://github.com/terrymacdonald/WindowsAudioWrapper.git
    id: WaitForAudioDeviceToAppear
    path: ../WindowsAudioWrapper/IWindowsAudioController.cs
    startLine: 48
  assemblies:
  - WindowsAudioWrapper
  namespace: WindowsAudioWrapper
  summary: >-
    Synchronously blocks execution until a matching audio endpoint becomes visible and active to the OS,

    or the specified timeout duration is reached.
  example: []
  syntax:
    content: bool WaitForAudioDeviceToAppear(AudioEndpointReference device, int timeoutMilliseconds)
    parameters:
    - id: device
      type: WindowsAudioWrapper.Models.AudioEndpointReference
      description: The search criteria target containing target identifiers (DeviceId, ContainerId, etc.).
    - id: timeoutMilliseconds
      type: System.Int32
      description: The maximum block window length in milliseconds.
    return:
      type: System.Boolean
      description: True if the matching hardware device arrives before the timeout expires; otherwise, false.
    content.vb: Function WaitForAudioDeviceToAppear(device As AudioEndpointReference, timeoutMilliseconds As Integer) As Boolean
  overload: WindowsAudioWrapper.IWindowsAudioController.WaitForAudioDeviceToAppear*
  nameWithType.vb: IWindowsAudioController.WaitForAudioDeviceToAppear(AudioEndpointReference, Integer)
  fullName.vb: WindowsAudioWrapper.IWindowsAudioController.WaitForAudioDeviceToAppear(WindowsAudioWrapper.Models.AudioEndpointReference, Integer)
  name.vb: WaitForAudioDeviceToAppear(AudioEndpointReference, Integer)
