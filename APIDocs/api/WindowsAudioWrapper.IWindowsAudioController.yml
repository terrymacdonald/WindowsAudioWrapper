    path: ../WindowsAudioWrapper/IWindowsAudioController.cs
    startLine: 57
  assemblies:
  - WindowsAudioWrapper
  namespace: WindowsAudioWrapper
  summary: Asynchronously monitors system hardware notifications until a matching audio endpoint becomes visible and active.
  example: []
  syntax:
    content: Task<bool> WaitForAudioDeviceToAppearAsync(AudioEndpointReference device, int timeoutMilliseconds, CancellationToken cancellationToken = default)
    parameters:
    - id: device
      type: WindowsAudioWrapper.Models.AudioEndpointReference
      description: The search criteria target containing target identifiers (DeviceId, ContainerId, etc.).
    - id: timeoutMilliseconds
      type: System.Int32
      description: The maximum wait duration length in milliseconds.
    - id: cancellationToken
      type: System.Threading.CancellationToken
      description: An optional token to cooperatively cancel the asynchronous monitoring task.
    return:
      type: System.Threading.Tasks.Task{System.Boolean}
      description: A task containing true if the hardware becomes active before the timeout; otherwise, false.
    content.vb: Function WaitForAudioDeviceToAppearAsync(device As AudioEndpointReference, timeoutMilliseconds As Integer, cancellationToken As CancellationToken = Nothing) As Task(Of Boolean)
  overload: WindowsAudioWrapper.IWindowsAudioController.WaitForAudioDeviceToAppearAsync*
